<section id="contact" style="padding: 100px 10%; background: #fff; display: flex; justify-content: space-between; gap: 50px; border-top: 1px solid #eee;">
        
        <div style="flex: 1;">
            <span style="color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; display: block; margin-bottom: 20px;">Get in Touch</span>
            <h2 style="font-size: 4rem; line-height: 1; margin: 0; font-weight: 900; letter-spacing: -3px;">Have a <br><span style="font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; color: #999;">Vision?</span></h2>
            <p style="margin-top: 40px; color: #666; font-size: 1.1rem; line-height: 1.6;">Whether it's a new build in Mohave Valley or property management in California, let's discuss how we can bring precision to your project.</p>
        </div>

        <div style="flex: 1; background: #fafafa; padding: 60px; border-radius: 20px;">
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
                <div style="margin-bottom: 30px;">
                    <label style="display:block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #999; margin-bottom: 10px;">Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required style="width: 100%; border: none; border-bottom: 1px solid #ddd; background: transparent; padding: 10px 0; font-size: 1.1rem; outline: none;">
                </div>

                <div style="margin-bottom: 30px;">
                    <label style="display:block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #999; margin-bottom: 10px;">Email or Phone</label>
                    <input type="text" name="contact" placeholder="hello@example.com" required style="width: 100%; border: none; border-bottom: 1px solid #ddd; background: transparent; padding: 10px 0; font-size: 1.1rem; outline: none;">
                </div>

                <div style="margin-bottom: 40px;">
                    <label style="display:block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #999; margin-bottom: 10px;">Message</label>
                    <textarea name="message" placeholder="Tell us about your project..." rows="3" required style="width: 100%; border: none; border-bottom: 1px solid #ddd; background: transparent; padding: 10px 0; font-size: 1.1rem; outline: none; resize: none;"></textarea>
                </div>

                <button type="submit" style="width: 100%; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 40px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;">
                    Send Request
                </button>
            </form>
        </div>
    </section>
