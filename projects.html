<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Sterling Land Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf6; --text: #1a1a1a; --accent: #bd5e3c; --dark: #14110f; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; text-transform: uppercase; text-decoration: none; color: inherit; }
        .logo span { color: var(--accent); }
        .nav-links a { text-decoration: none; color: #666; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-left: 30px; }

        .gallery { padding: 100px 5%; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .project-card { position: relative; border-radius: 20px; overflow: hidden; background: #222; height: 500px; transition: 0.4s; cursor: pointer; }
        .project-card:hover { transform: translateY(-10px); }
        .project-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; }
        .category { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .title { font-size: 1.8rem; margin: 10px 0; font-weight: 700; }
        
        footer { padding: 50px; text-align: center; background: var(--dark); color: white; margin-top: 100px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">STERLING <span>LAND GROUP</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html" style="color: var(--accent);">Projects</a>
        </div>
    </nav>

    <section class="gallery">
        <div class="project-grid">
            <div class="project-card">
                <img src="hero-bg.png" class="project-img">
                <div class="overlay">
                    <span class="category">New Construction</span>
                    <h3 class="title">1965 E Arditto</h3>
                    <p>Mohave Valley, AZ</p>
                </div>
            </div>
            <div class="project-card">
                <div style="height:100%; background:#333;"></div>
                <div class="overlay">
                    <span class="category">Residential</span>
                    <h3 class="title">4579 Calle Amigo</h3>
                    <p>Fort Mohave, AZ</p>
                </div>
            </div>
            <div class="project-card">
                <div style="height:100%; background:#333;"></div>
                <div class="overlay">
                    <span class="category">Multi-Unit Complex</span>
                    <h3 class="title">Phoenix Drive</h3>
                    <p>9821, 9825, 9849, 9851 Phoenix Dr</p>
                </div>
            </div>
            <div class="project-card">
                <div style="height:100%; background:#333;"></div>
                <div class="overlay">
                    <span class="category">Property Management</span>
                    <h3 class="title">13 Spanish Bay</h3>
                    <p>Mohave Valley, AZ</p>
                </div>
            </div>
        </div>
    </section>

    <footer>STERLING LAND GROUP | (840) 274-5290</footer>
</body>
</html>
